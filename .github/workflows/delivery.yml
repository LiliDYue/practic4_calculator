name: delivery

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/calculadora:${{ github.ref_name }} .
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/calculadora:latest .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculadora:${{ github.ref_name }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculadora:latest